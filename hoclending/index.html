<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bernard Consulting Services | HOC Lending Portal</title>
    <meta http-equiv="refresh" content="2; url=https://arffinancial.my.site.com/portal/ARFRegistration?RPId=003Vy00001Xq5eYIAR">
    
    <style>
        body { 
            background-color: #010B13; 
            color: #ffffff; 
            font-family: -apple-system, system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .gateway-card {
            padding: 40px;
            border: 1px solid rgba(166, 124, 82, 0.2);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            max-width: 450px;
            width: 85%;
        }
        .brand {
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #A67C52; /* Bernard Gold */
            margin-bottom: 20px;
            font-weight: 700;
        }
        .partner-status {
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 30px;
            color: #cbd5e1;
            line-height: 1.5;
        }
        .loading-line {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        .loading-active {
            width: 100%;
            height: 100%;
            background: #A67C52;
            position: absolute;
            left: -100%;
            animation: load 2s ease-in-out forwards;
        }
        @keyframes load { 100% { left: 0%; } }
        .footer-tag {
            margin-top: 25px;
            font-size: 0.6rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="gateway-card">
        <div class="brand">Bernard Consulting Services LLC</div>
        <div class="partner-status">
            Opening the <strong>HOC Lending</strong> Priority Channel...
        </div>
        <div class="loading-line"><div class="loading-active"></div></div>
        <div class="footer-tag">Authorized Channel Partner</div>
    </div>
</body>
</html>
