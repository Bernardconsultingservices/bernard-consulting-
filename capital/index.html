<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bernard Consulting Services | Secure Gateway</title>
    <meta http-equiv="refresh" content="2; url=https://arffinancial.my.site.com/portal/ARFRegistration?RPId=003Vy00001Xq5eYIAR">
    
    <style>
        body { 
            background-color: #010B13; 
            color: #ffffff; 
            font-family: -apple-system, system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .gateway-card {
            text-align: center;
            padding: 40px;
            border: 1px solid rgba(166, 124, 82, 0.2);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 80%;
        }
        .brand {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #A67C52; /* Strategic Gold */
            margin-bottom: 25px;
            font-weight: 700;
        }
        .status {
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 30px;
            color: #cbd5e1;
        }
        .loader-bar {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        .loader-progress {
            width: 100%;
            height: 100%;
            background: #A67C52;
            position: absolute;
            left: -100%;
            animation: slide 2s ease-in-out forwards;
        }
        @keyframes slide { 100% { left: 0%; } }
        .secure-note {
            margin-top: 25px;
            font-size: 0.65rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="gateway-card">
        <div class="brand">Bernard Consulting Services LLC</div>
        <div class="status">Securing your institutional capital session...</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
        <div class="secure-note">End-to-End Encryption Active</div>
    </div>
</body>
</html>
